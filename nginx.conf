server {
    server_name nthuobs.phys.nthu.edu.tw;

    access_log /var/log/nginx/nthuobs_access.log;
    error_log /var/log/nginx/nthuobs_error.log;

    # 1. Handle /weather path -> Route to Port 3000
    location /weather/ {
        proxy_pass http://192.168.0.201:3000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 2. Handle Root directory -> Route to Next.js on Port 3001
    location / {
        proxy_pass http://192.168.0.201:3001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Next.js HMR in dev mode)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/nthuobs.phys.nthu.edu.tw/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/nthuobs.phys.nthu.edu.tw/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = nthuobs.phys.nthu.edu.tw) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name nthuobs.phys.nthu.edu.tw;
    return 404; # managed by Certbot
}
